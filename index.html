<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionando Dados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0c;
            --dark-gray: #121218;
            --white: #ffffff;
            --green: #00ff66;
            --gold: #ffd700;
            --lilac: #9d4edd;
            --glow-green: rgba(0, 255, 102, 0.4);
            --glow-lilac: rgba(157, 78, 221, 0.4);
            --glow-gold: rgba(255, 215, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            background-image: 
                linear-gradient(rgba(18, 18, 24, 0.85), rgba(10, 10, 12, 0.95)),
                radial-gradient(circle at 50% 50%, var(--lilac) 0%, transparent 60%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--black);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--lilac);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px dashed var(--lilac);
            padding-bottom: 20px;
            position: relative;
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--glow-gold), 0 0 20px var(--glow-gold);
        }

        header p {
            color: var(--green);
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .panel {
            background: rgba(18, 18, 24, 0.8);
            border: 2px solid var(--lilac);
            box-shadow: 0 0 15px var(--glow-lilac);
            border-radius: 8px;
            padding: 30px;
            backdrop-filter: blur(10px);
            position: relative;
            margin-bottom: 30px;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 20px;
            width: 50px;
            height: 2px;
            background: var(--green);
            box-shadow: 0 0 10px var(--green);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input, textarea {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--white);
            padding: 12px;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--green);
            box-shadow: 0 0 10px var(--glow-green);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-main {
            width: 100%;
            background: transparent;
            border: 2px solid var(--green);
            color: var(--green);
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-main.ready {
            opacity: 1;
            pointer-events: auto;
            background: rgba(0, 255, 102, 0.1);
            text-shadow: 0 0 5px var(--green);
            box-shadow: 0 0 15px var(--glow-green);
        }

        .btn-main.ready:hover {
            background: var(--green);
            color: var(--black);
            box-shadow: 0 0 25px var(--green);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Coletando Dados</h1>
            <p>// Terminal de Armazenamento Web</p>
        </header>

        <div id="form-panel" class="panel">
            <form id="data-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="name">Nome</label>
                        <input type="text" id="name" required placeholder="Ex: Arthur Pendragon">
                    </div>
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required placeholder="Ex: name@domain.com">
                    </div>
                    <div class="input-group">
                        <label for="phone">Telefone / Celular</label>
                        <input type="tel" id="phone" required placeholder="Ex: (11) 99999-9999">
                    </div>
                    <div class="input-group">
                        <label for="birthdate">Data de Registro</label>
                        <input type="date" id="birthdate" required>
                    </div>
                    <div class="input-group full-width">
                        <label for="obs">Observações / Informações Extras</label>
                        <textarea id="obs" required placeholder="Digite notas adicionais criptografadas aqui..."></textarea>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="btn-main">Iniciar Upload de Dados</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDSfVDrSTe7XQdnuS2MKZee3F2BX_0oC20",
            authDomain: "coletando-2b90b.firebaseapp.com",
            databaseURL: "https://coletando-2b90b-default-rtdb.firebaseio.com",
            projectId: "coletando-2b90b",
            storageBucket: "coletando-2b90b.firebasestorage.app",
            messagingSenderId: "108357189904",
            appId: "1:108357189904:web:45e92f95c98d9cdc0f6595"
        };

        // Inicializando o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, "operadores");

        // Elementos do DOM
        const dataForm = document.getElementById('data-form');
        const submitBtn = document.getElementById('submit-btn');
        const inputs = dataForm.querySelectorAll('input, textarea');

        // VALIDAÇÃO EM TEMPO REAL (Habilitar Botão quando tudo estiver preenchido)
        function checkFormValidity() {
            let allFilled = true;
            inputs.forEach(input => {
                if (!input.value.trim()) {
                    allFilled = false;
                }
            });
            
            if (allFilled) {
                submitBtn.classList.add('ready');
            } else {
                submitBtn.classList.remove('ready');
            }
        }

        inputs.forEach(input => {
            input.addEventListener('input', checkFormValidity);
            input.addEventListener('change', checkFormValidity);
        });

        // ENVIAR DADOS PARA O FIREBASE
        dataForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                birthdate: document.getElementById('birthdate').value,
                obs: document.getElementById('obs').value
            };

            // Criar novo registro
            push(dbRef, formData)
                .then(() => {
                    alert("Dados enviados para a Nuvem com sucesso!");
                    dataForm.reset();
                    checkFormValidity();
                })
                .catch(err => alert("Erro ao enviar: " + err));
        });
    </script>
</body>
</html>
